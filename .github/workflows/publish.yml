name: Publish Extension Wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: "DuckDB version (e.g. 1.4.4)"
        required: true
        type: string
      environment:
        description: "Target PyPI environment"
        required: true
        type: choice
        options:
          - pypi-test
          - pypi
        default: pypi-test
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Build extension wheels
        run: uv run scripts/build_extension_wheels.py --version ${{ inputs.version }} --out-dir dist/

      - name: Build alias wheels
        run: uv run scripts/build_alias_wheels.py --version ${{ inputs.version }} --out-dir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.environment == 'pypi-test' && 'https://test.pypi.org/legacy/' || '' }}
